services:

  web:
    build: .
    platform: linux/amd64
    entrypoint: ["/app/backend-entrypoint.sh"]
    command: python backend/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: npm run dev
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
      - VITE_BACKEND_URL=http://web:8000
